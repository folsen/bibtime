# Fly.io staging configuration for BibTime.
#
# Deploy: fly deploy -c fly.staging.toml
app = "bibtime-staging"
primary_region = "arn"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]

[env]
  PHX_SERVER = "true"
  DATABASE_PATH = "/data/bibtime.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Staging may suspend when idle; Litestream resumes on wake.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  # Cheap insurance against OOMs during asset-heavy admin flows.
  swap_size_mb = 512

[mounts]
  source = "bibtime_staging_data"
  destination = "/data"
